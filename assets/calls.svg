  <path d="M 110 259 L 183 228 L 256 226 L 329 226 L 402 226 L 475 226 L 548 217 L 621 127 L 694 110 L 740 107" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

